# Default values for seerr
# Uses lib-chart workload model (0.0.14)

# ----------------------------------------------------------------------------
# Global Configuration
# ----------------------------------------------------------------------------
global:
  name: seerr
  namespace: media-center
  chart:
    appVersion: v3.1.0
  labels: {}

# ----------------------------------------------------------------------------
# Workload Configuration
# ----------------------------------------------------------------------------
workload:
  type: deployment
  spec:
    replicas: 1
    strategy:
      type: Recreate
    revisionHistoryLimit: 3
    terminationGracePeriodSeconds: 60
    dnsPolicy: ClusterFirst
    enableServiceLinks: false
    automountServiceAccountToken: false
    nodeSelector:
      kubernetes.io/os: linux

    podLabels:
      app.kubernetes.io/part-of: media-center
      logging.kubernetes.io/component: media-center
      logging.kubernetes.io/service: seerr

    podSecurityContext:
      fsGroup: 20030
      fsGroupChangePolicy: OnRootMismatch
      runAsNonRoot: true
      supplementalGroups: []

    containers:
      seerr:
        enabled: true
        image:
          repository: ghcr.io/seerr-team/seerr
          tag: "v3.1.0@sha256:b35ba0461c4a1033d117ac1e5968fd4cbe777899e4cbfbdeaf3d10a42a0eb7e9"
          pullPolicy: IfNotPresent

        env:
          - name: TZ
            value: "UTC"
          - name: PORT
            value: "8080"
          - name: HOST
            value: "0.0.0.0"
          - name: CONFIG_DIRECTORY
            value: "/app/config"
          - name: DB_TYPE
            value: "postgres"
          - name: DB_LOG_QUERIES
            value: "false"

        # DB credentials are consumed from external Secret/seerr-db.
        # Secret lifecycle is intentionally managed outside this chart.
        envFrom:
          - secretRef:
              name: seerr-db

        ports:
          - containerPort: 8080
            name: http
            protocol: TCP

        volumeMounts:
          - name: config
            mountPath: /app/config
          - name: settings
            mountPath: /app/config/settings.json
            subPath: settings.json
          - name: tmp
            mountPath: /tmp

        livenessProbe:
          httpGet:
            path: /api/v1/status
            port: http
            scheme: HTTP
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 5

        readinessProbe:
          httpGet:
            path: /api/v1/status
            port: http
            scheme: HTTP
          failureThreshold: 3
          initialDelaySeconds: 15
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5

        startupProbe:
          httpGet:
            path: /api/v1/status
            port: http
            scheme: HTTP
          failureThreshold: 30
          initialDelaySeconds: 10
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 5

        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 20030
          runAsGroup: 20030
          allowPrivilegeEscalation: false
          privileged: false
          appArmorProfile:
            type: RuntimeDefault
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault

        resources:
          requests:
            cpu: 200m
            memory: 512Mi
            ephemeral-storage: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
            ephemeral-storage: 2Gi

# ----------------------------------------------------------------------------
# Service Configuration
# ----------------------------------------------------------------------------
network:
  enabled: true
  services:
    enabled: true
    items:
      http:
        enabled: true
        type: ClusterIP
        ports:
          http:
            port: 8080
            targetPort: http
            protocol: TCP
        annotations:
          description: "Seerr HTTP service"

  httpRoute:
    enabled: true
    port: 8080
    host: seerr-k8s.orhayoun.com
    gateway:
      name: shared-platform-gateway
      namespace: istio-system
    routes:
      - name: route
        enabled: true
        listener:
          sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: seerr-http
                port: 8080
                weight: 100
                group: ""
                kind: Service
      - name: http-redirect
        enabled: true
        listener:
          sectionName: http
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            filters:
              - type: RequestRedirect
                requestRedirect:
                  scheme: https
                  statusCode: 301

  networkPolicy:
    enabled: true
    items:
      default:
        enabled: true
        policyTypes:
          - Ingress
          - Egress
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: istio-system
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: shared-platform-gateway
            ports:
              - protocol: TCP
                port: 15008
        egress:
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
                podSelector:
                  matchLabels:
                    k8s-app: kube-dns
            ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53

          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: postgresql
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: databases
            ports:
              - protocol: TCP
                port: 5432

          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: media-center
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: sonarr
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: media-center
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: radarr
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: istio-system
            ports:
              - protocol: TCP
                port: 15008

          - to:
              - ipBlock:
                  cidr: "0.0.0.0/0"
                  except:
                    - "10.42.0.0/16"
                    - "10.43.0.0/16"
                    - "192.168.0.0/16"
            ports:
              - protocol: TCP
                port: 80
              - protocol: TCP
                port: 443

  istio:
    enabled: true
    authorizationPolicy:
      enabled: true
      items:
        ingress:
          enabled: true
          action: ALLOW
          rules:
            - from:
                - source:
                    principals:
                      - "cluster.local/ns/istio-system/sa/shared-platform-gateway-istio"
              to:
                - operation:
                    ports: ["8080"]
    destinationRule:
      enabled: true
      host: seerr-http
      trafficPolicy:
        connectionPool:
          tcp:
            maxConnections: 100
          http:
            http1MaxPendingRequests: 10
            http2MaxRequests: 100
            maxRequestsPerConnection: 2
        outlierDetection:
          consecutive5xxErrors: 5
          interval: 30s
          baseEjectionTime: 30s
          maxEjectionPercent: 50

# ----------------------------------------------------------------------------
# Feature: Persistence
# ----------------------------------------------------------------------------
persistence:
  enabled: true
  claims:
    config:
      size: 5Gi
      storageClass: longhorn
      accessMode: ReadWriteOnce
      retain: true
  volumes:
    - name: config
      persistentVolumeClaim:
        claimName: seerr-config
    - name: settings
      nfs:
        server: snorlax.orhayoun.com
        path: /mnt/vol1/k8s/media-center/seerr/
    - name: tmp
      emptyDir:
        sizeLimit: 1Gi

# ----------------------------------------------------------------------------
# Feature: Observability
# ----------------------------------------------------------------------------
metrics:
  enabled: true
  # ServiceMonitor scaffold remains disabled by default because Seerr does not
  # expose native Prometheus metrics today. Keep this block for future support.
  serviceMonitor:
    enabled: false
    port: 8080
    portName: http
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    honorLabels: false
    selector:
      matchLabels:
        app.kubernetes.io/name: seerr
        app.kubernetes.io/instance: seerr
        app.kubernetes.io/component: service-http
    namespaceSelector:
      matchNames:
        - media-center
    relabelings:
      - action: replace
        sourceLabels:
          - __meta_kubernetes_namespace
        targetLabel: namespace
      - action: replace
        sourceLabels:
          - __meta_kubernetes_pod_name
        targetLabel: instance
    metricRelabelings:
      - action: replace
        replacement: seerr
        targetLabel: service
      - action: replace
        replacement: media-center
        targetLabel: component

  # PrometheusRule based on platform metrics only (istio + cAdvisor + kube-state-metrics + kubelet)
  prometheusRule:
    enabled: true
    rules:
      - alert: SeerrDeploymentUnavailable
        expr: kube_deployment_status_replicas_available{deployment="seerr", namespace="media-center"} < 1
        for: 5m
        labels:
          severity: critical
          service: seerr
          component: media-center
        annotations:
          summary: "Seerr deployment is unavailable"
          description: "No Seerr replicas are available for more than 5 minutes."
      - alert: SeerrContainerRestartsHigh
        expr: increase(kube_pod_container_status_restarts_total{namespace="media-center", pod=~"seerr-.*", container="seerr"}[1h]) > 2
        for: 0m
        labels:
          severity: warning
          service: seerr
          component: media-center
        annotations:
          summary: "Seerr container restarting frequently"
          description: "Seerr container in pod {{ $labels.pod }} restarted more than 2 times in the last hour."
      - alert: SeerrHighCPUUtilization
        expr: |
          (
            sum(rate(container_cpu_usage_seconds_total{namespace="media-center", pod=~"seerr-.*", container="seerr"}[5m]))
            /
            sum(kube_pod_container_resource_requests{namespace="media-center", pod=~"seerr-.*", container="seerr", resource="cpu"})
          ) * 100 > 80
        for: 10m
        labels:
          severity: warning
          service: seerr
          component: media-center
          resource: cpu
        annotations:
          summary: "Seerr CPU utilization is high"
          description: "Seerr CPU usage is above 80% of requested CPU for more than 10 minutes (value={{ $value }}%)."
      - alert: SeerrHighMemoryUtilization
        expr: |
          (
            max(container_memory_working_set_bytes{namespace="media-center", pod=~"seerr-.*", container="seerr"})
            /
            max(kube_pod_container_resource_limits{namespace="media-center", pod=~"seerr-.*", container="seerr", resource="memory"})
          ) * 100 > 85
        for: 10m
        labels:
          severity: warning
          service: seerr
          component: media-center
          resource: memory
        annotations:
          summary: "Seerr memory utilization is high"
          description: "Seerr memory working set is above 85% of memory limit for more than 10 minutes (value={{ $value }}%)."
      - alert: SeerrConfigPVCHighUsage
        expr: |
          (
            kubelet_volume_stats_used_bytes{persistentvolumeclaim="seerr-config", namespace="media-center"}
            /
            kubelet_volume_stats_capacity_bytes{persistentvolumeclaim="seerr-config", namespace="media-center"}
          ) * 100 > 85
        for: 15m
        labels:
          severity: warning
          service: seerr
          component: media-center
          resource: storage
        annotations:
          summary: "Seerr config PVC usage is high"
          description: "Seerr config PVC usage has exceeded 85% for more than 15 minutes (value={{ $value }}%)."
      - alert: SeerrConfigPVCInodesHighUsage
        expr: |
          (
            kubelet_volume_stats_inodes_used{persistentvolumeclaim="seerr-config", namespace="media-center"}
            /
            kubelet_volume_stats_inodes{persistentvolumeclaim="seerr-config", namespace="media-center"}
          ) * 100 > 85
        for: 15m
        labels:
          severity: warning
          service: seerr
          component: media-center
          resource: storage
        annotations:
          summary: "Seerr config PVC inode usage is high"
          description: "Seerr config PVC inode usage has exceeded 85% for more than 15 minutes (value={{ $value }}%)."
      - alert: SeerrIstioHigh5xxRate
        expr: |
          (
            (
              sum(rate(istio_requests_total{destination_service_name="seerr-http", destination_service_namespace="media-center", response_code=~"5.."}[5m]))
              /
              sum(rate(istio_requests_total{destination_service_name="seerr-http", destination_service_namespace="media-center"}[5m]))
            ) * 100 > 2
          )
          and
          sum(rate(istio_requests_total{destination_service_name="seerr-http", destination_service_namespace="media-center"}[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
          service: seerr
          component: media-center
          traffic: istio
        annotations:
          summary: "Seerr Istio 5xx error rate is high"
          description: "Seerr 5xx response rate exceeded 2% for more than 10 minutes."
      - alert: SeerrIstioHighP95Latency
        expr: histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{destination_service_name="seerr-http", destination_service_namespace="media-center"}[5m])) by (le)) > 750
        for: 10m
        labels:
          severity: warning
          service: seerr
          component: media-center
          traffic: istio
        annotations:
          summary: "Seerr Istio p95 latency is high"
          description: "Seerr p95 request latency is above 750ms for more than 10 minutes (value={{ $value }}ms)."
      - alert: SeerrAuthorizationPolicyDenials
        expr: |
          sum(
            rate(istio_requests_total{
              destination_workload="seerr",
              destination_workload_namespace="media-center",
              destination_service_name="seerr-http",
              request_protocol="http",
              response_code="403",
              response_flags="SEC"
            }[5m])
          ) > 0
        for: 2m
        labels:
          severity: warning
          service: seerr
          component: media-center
          security: authorization
        annotations:
          summary: "Seerr authorization policy denials detected"
          description: "Seerr is experiencing authorization policy denials (403/SEC)."
      - alert: SeerrHighAuthorizationDenialRate
        expr: |
          (
            sum(
              rate(istio_requests_total{
                destination_workload="seerr",
                destination_workload_namespace="media-center",
                destination_service_name="seerr-http",
                request_protocol="http",
                response_code="403",
                response_flags="SEC"
              }[5m])
            )
            /
            sum(
              rate(istio_requests_total{
                destination_workload="seerr",
                destination_workload_namespace="media-center",
                destination_service_name="seerr-http",
                request_protocol="http"
              }[5m])
            )
          ) * 100 > 5
        for: 5m
        labels:
          severity: critical
          service: seerr
          component: media-center
          security: authorization
        annotations:
          summary: "Seerr high authorization denial rate"
          description: "Seerr has a high authorization denial rate ({{ $value }}% of requests denied)."

  # Grafana dashboard generated from dashboards/app.json
  grafana:
    enabled: true
    instanceSelector:
      matchLabels:
        app.kubernetes.io/instance: prometheus
        app.kubernetes.io/name: grafana
    dashboard:
      enabled: true
      items:
        seerr-dashboard:
          enabled: true
          name: "application"
          allowCrossNamespaceImport: true
          file: "app.json"

# ----------------------------------------------------------------------------
# Service Account
# ----------------------------------------------------------------------------
serviceAccount:
  create: true
  name: "seerr"
  automount: false
  annotations:
    description: "Seerr media center service account"

# ----------------------------------------------------------------------------
# Pod Disruption Budget
# ----------------------------------------------------------------------------
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  unhealthyPodEvictionPolicy: AlwaysAllow
