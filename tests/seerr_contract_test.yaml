suite: seerr chart contract
templates:
  - templates/all.yaml
tests:
  - it: renders expected default resource set and ingress host
    asserts:
      - hasDocuments:
          count: 11
      - documentSelector:
          path: metadata.name
          value: seerr-route
        equal:
          path: spec.hostnames[0]
          value: seerr-k8s.orhayoun.com
      - documentSelector:
          path: kind
          value: PrometheusRule
        exists:
          path: metadata.name
      - documentSelector:
          path: kind
          value: GrafanaDashboard
        equal:
          path: spec.instanceSelector.matchLabels["app.kubernetes.io/instance"]
          value: prometheus
      - documentSelector:
          path: kind
          value: GrafanaDashboard
        equal:
          path: spec.instanceSelector.matchLabels["app.kubernetes.io/name"]
          value: grafana
      - documentSelector:
          path: kind
          value: DestinationRule
        equal:
          path: spec.host
          value: seerr-http

  - it: enables serviceMonitor when explicitly turned on
    set:
      metrics:
        serviceMonitor:
          enabled: true
    asserts:
      - hasDocuments:
          count: 12
      - documentSelector:
          path: kind
          value: ServiceMonitor
        equal:
          path: spec.endpoints[0].port
          value: http

  - it: wires seerr application container security and pvc correctly
    asserts:
      - documentSelector:
          path: kind
          value: Deployment
        equal:
          path: spec.template.spec.containers[0].name
          value: seerr
      - documentSelector:
          path: kind
          value: Deployment
        equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - documentSelector:
          path: kind
          value: Deployment
        equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 20030
      - documentSelector:
          path: kind
          value: Deployment
        equal:
          path: spec.template.spec.containers[0].securityContext.runAsGroup
          value: 20030
      - documentSelector:
          path: kind
          value: PersistentVolumeClaim
        equal:
          path: metadata.name
          value: seerr-config

  - it: keeps minimal scenario render compact and deterministic
    values:
      - scenarios/minimal.yaml
    asserts:
      - hasDocuments:
          count: 4

  - it: disables destination rule when explicitly turned off
    set:
      network:
        istio:
          destinationRule:
            enabled: false
    asserts:
      - hasDocuments:
          count: 10

  - it: applies httproute host override
    set:
      network:
        httpRoute:
          host: seerr.example.internal
    asserts:
      - documentSelector:
          path: metadata.name
          value: seerr-route
        equal:
          path: spec.hostnames[0]
          value: seerr.example.internal

  - it: applies destination rule host override
    set:
      network:
        istio:
          destinationRule:
            host: seerr-custom-http
    asserts:
      - documentSelector:
          path: kind
          value: DestinationRule
        equal:
          path: spec.host
          value: seerr-custom-http

  - it: applies explicit seerr image override for controlled rollouts
    set:
      workload:
        spec:
          containers:
            seerr:
              image:
                repository: registry.internal/seerr
                tag: ci-test
    asserts:
      - documentSelector:
          path: kind
          value: Deployment
        equal:
          path: spec.template.spec.containers[0].image
          value: registry.internal/seerr:ci-test

  - it: keeps seerr networking and health probes wired to stable defaults
    asserts:
      - documentSelector:
          path: metadata.name
          value: seerr-http
        equal:
          path: spec.ports[0].port
          value: 8080
      - documentSelector:
          path: kind
          value: Deployment
        equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /api/v1/status
      - documentSelector:
          path: kind
          value: Deployment
        equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /api/v1/status
      - documentSelector:
          path: kind
          value: Deployment
        equal:
          path: spec.template.spec.volumes[0].persistentVolumeClaim.claimName
          value: seerr-config
      - documentSelector:
          path: kind
          value: Deployment
        equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent

  - it: sources postgres settings from external seerr-db secret
    asserts:
      - documentSelector:
          path: kind
          value: Deployment
        equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: seerr-db
      - documentSelector:
          path: kind
          value: Deployment
        equal:
          path: spec.template.spec.containers[0].env[4].name
          value: DB_TYPE
      - documentSelector:
          path: kind
          value: Deployment
        equal:
          path: spec.template.spec.containers[0].env[4].value
          value: postgres
