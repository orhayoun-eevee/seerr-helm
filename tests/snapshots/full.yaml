# Source: seerr/templates/all.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: media-center
  labels:
    app.kubernetes.io/component: deployment
    app.kubernetes.io/instance: test-release
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: seerr
    app.kubernetes.io/version: v3.1.0
    helm.sh/chart: seerr-0.0.1
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: seerr
      app.kubernetes.io/instance: test-release
  template:
    metadata:
      labels:
        app.kubernetes.io/component: deployment
        app.kubernetes.io/instance: test-release
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: seerr
        app.kubernetes.io/version: v3.1.0
        helm.sh/chart: seerr-0.0.1
        app.kubernetes.io/part-of: media-center
        logging.kubernetes.io/component: media-center
        logging.kubernetes.io/service: seerr
    spec:
      
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        supplementalGroups: []
      serviceAccountName: seerr
      nodeSelector:
        kubernetes.io/os: linux
      dnsPolicy: ClusterFirst
      automountServiceAccountToken: false
      enableServiceLinks: false
      containers:
        - name: seerr
          image: ghcr.io/seerr-team/seerr:v3.1.0@sha256:b35ba0461c4a1033d117ac1e5968fd4cbe777899e4cbfbdeaf3d10a42a0eb7e9
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: TZ
              value: UTC
            - name: PORT
              value: "8080"
            - name: HOST
              value: 0.0.0.0
            - name: CONFIG_DIRECTORY
              value: /app/config
            - name: DB_TYPE
              value: postgres
            - name: DB_LOG_QUERIES
              value: "false"
          envFrom:
            - secretRef:
                name: seerr-db
          volumeMounts:
            - mountPath: /app/config
              name: config
            - mountPath: /tmp
              name: tmp
          resources:
            limits:
              cpu: 1000m
              ephemeral-storage: 2Gi
              memory: 2Gi
            requests:
              cpu: 200m
              ephemeral-storage: 1Gi
              memory: 512Mi
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/v1/status
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/v1/status
              port: http
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          startupProbe:
            failureThreshold: 30
            httpGet:
              path: /api/v1/status
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            appArmorProfile:
              type: RuntimeDefault
            capabilities:
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: seerr-config
        - emptyDir:
            sizeLimit: 1Gi
          name: tmp
