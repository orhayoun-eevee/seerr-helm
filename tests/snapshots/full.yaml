apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: seerr-ingress
  namespace: media-center
  labels:
    app.kubernetes.io/component: authorization-policy
    app.kubernetes.io/instance: test-release
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: seerr
    app.kubernetes.io/version: v3.1.0
    helm.sh/chart: seerr-0.0.1
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seerr
      app.kubernetes.io/instance: test-release
  action: ALLOW
  rules:
    - from:
      - source:
          principals:
          - cluster.local/ns/istio-system/sa/shared-platform-gateway-istio
      to:
      - operation:
          ports:
          - "8080"
---
# Source: seerr/templates/all.yaml
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: seerr
  namespace: media-center
  labels:
    app.kubernetes.io/component: destination-rule
    app.kubernetes.io/instance: test-release
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: seerr
    app.kubernetes.io/version: v3.1.0
    helm.sh/chart: seerr-0.0.1
spec:
  host: seerr-http
  trafficPolicy:
    connectionPool:
      http:
        http1MaxPendingRequests: 10
        http2MaxRequests: 100
        maxRequestsPerConnection: 2
      tcp:
        maxConnections: 100
    outlierDetection:
      baseEjectionTime: 30s
      consecutive5xxErrors: 5
      interval: 30s
      maxEjectionPercent: 50
