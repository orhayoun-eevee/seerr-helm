# Source: seerr/templates/all.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: seerr
  namespace: media-center
  labels:
    app.kubernetes.io/component: prometheus-rule
    app.kubernetes.io/instance: test-release
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: seerr
    app.kubernetes.io/version: v3.1.0
    helm.sh/chart: seerr-0.0.2
spec:
  groups:
    - name: seerr.rules
      rules:
        - alert: SeerrDeploymentUnavailable
          annotations:
            description: No Seerr replicas are available for more than 5 minutes.
            summary: Seerr deployment is unavailable
          expr: kube_deployment_status_replicas_available{deployment="seerr", namespace="media-center"}
            < 1
          for: 5m
          labels:
            component: media-center
            service: seerr
            severity: critical
        - alert: SeerrContainerRestartsHigh
          annotations:
            description: Seerr container in pod {{ $labels.pod }} restarted more than 2 times
              in the last hour.
            summary: Seerr container restarting frequently
          expr: increase(kube_pod_container_status_restarts_total{namespace="media-center",
            pod=~"seerr-.*", container="seerr"}[1h]) > 2
          for: 0m
          labels:
            component: media-center
            service: seerr
            severity: warning
        - alert: SeerrHighCPUUtilization
          annotations:
            description: Seerr CPU usage is above 80% of requested CPU for more than 10 minutes
              (value={{ $value }}%).
            summary: Seerr CPU utilization is high
          expr: |
            (
              sum(rate(container_cpu_usage_seconds_total{namespace="media-center", pod=~"seerr-.*", container="seerr"}[5m]))
              /
              sum(kube_pod_container_resource_requests{namespace="media-center", pod=~"seerr-.*", container="seerr", resource="cpu"})
            ) * 100 > 80
          for: 10m
          labels:
            component: media-center
            resource: cpu
            service: seerr
            severity: warning
        - alert: SeerrHighMemoryUtilization
          annotations:
            description: Seerr memory working set is above 85% of memory limit for more than
              10 minutes (value={{ $value }}%).
            summary: Seerr memory utilization is high
          expr: |
            (
              max(container_memory_working_set_bytes{namespace="media-center", pod=~"seerr-.*", container="seerr"})
              /
              max(kube_pod_container_resource_limits{namespace="media-center", pod=~"seerr-.*", container="seerr", resource="memory"})
            ) * 100 > 85
          for: 10m
          labels:
            component: media-center
            resource: memory
            service: seerr
            severity: warning
        - alert: SeerrConfigPVCHighUsage
          annotations:
            description: Seerr config PVC usage has exceeded 85% for more than 15 minutes
              (value={{ $value }}%).
            summary: Seerr config PVC usage is high
          expr: |
            (
              kubelet_volume_stats_used_bytes{persistentvolumeclaim="seerr-config", namespace="media-center"}
              /
              kubelet_volume_stats_capacity_bytes{persistentvolumeclaim="seerr-config", namespace="media-center"}
            ) * 100 > 85
          for: 15m
          labels:
            component: media-center
            resource: storage
            service: seerr
            severity: warning
        - alert: SeerrConfigPVCInodesHighUsage
          annotations:
            description: Seerr config PVC inode usage has exceeded 85% for more than 15 minutes
              (value={{ $value }}%).
            summary: Seerr config PVC inode usage is high
          expr: |
            (
              kubelet_volume_stats_inodes_used{persistentvolumeclaim="seerr-config", namespace="media-center"}
              /
              kubelet_volume_stats_inodes{persistentvolumeclaim="seerr-config", namespace="media-center"}
            ) * 100 > 85
          for: 15m
          labels:
            component: media-center
            resource: storage
            service: seerr
            severity: warning
        - alert: SeerrIstioHigh5xxRate
          annotations:
            description: Seerr 5xx response rate exceeded 2% for more than 10 minutes.
            summary: Seerr Istio 5xx error rate is high
          expr: |
            (
              (
                sum(rate(istio_requests_total{destination_service_name="seerr-http", destination_service_namespace="media-center", response_code=~"5.."}[5m]))
                /
                sum(rate(istio_requests_total{destination_service_name="seerr-http", destination_service_namespace="media-center"}[5m]))
              ) * 100 > 2
            )
            and
            sum(rate(istio_requests_total{destination_service_name="seerr-http", destination_service_namespace="media-center"}[5m])) > 0.1
          for: 10m
          labels:
            component: media-center
            service: seerr
            severity: warning
            traffic: istio
        - alert: SeerrIstioHighP95Latency
          annotations:
            description: Seerr p95 request latency is above 750ms for more than 10 minutes
              (value={{ $value }}ms).
            summary: Seerr Istio p95 latency is high
          expr: histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{destination_service_name="seerr-http",
            destination_service_namespace="media-center"}[5m])) by (le)) > 750
          for: 10m
          labels:
            component: media-center
            service: seerr
            severity: warning
            traffic: istio
        - alert: SeerrAuthorizationPolicyDenials
          annotations:
            description: Seerr is experiencing authorization policy denials (403/SEC).
            summary: Seerr authorization policy denials detected
          expr: |
            sum(
              rate(istio_requests_total{
                destination_workload="seerr",
                destination_workload_namespace="media-center",
                destination_service_name="seerr-http",
                request_protocol="http",
                response_code="403",
                response_flags="SEC"
              }[5m])
            ) > 0
          for: 2m
          labels:
            component: media-center
            security: authorization
            service: seerr
            severity: warning
        - alert: SeerrHighAuthorizationDenialRate
          annotations:
            description: Seerr has a high authorization denial rate ({{ $value }}% of requests
              denied).
            summary: Seerr high authorization denial rate
          expr: |
            (
              sum(
                rate(istio_requests_total{
                  destination_workload="seerr",
                  destination_workload_namespace="media-center",
                  destination_service_name="seerr-http",
                  request_protocol="http",
                  response_code="403",
                  response_flags="SEC"
                }[5m])
              )
              /
              sum(
                rate(istio_requests_total{
                  destination_workload="seerr",
                  destination_workload_namespace="media-center",
                  destination_service_name="seerr-http",
                  request_protocol="http"
                }[5m])
              )
            ) * 100 > 5
          for: 5m
          labels:
            component: media-center
            security: authorization
            service: seerr
            severity: critical
